template:
  name: Standard CI Template
  identifier: standard_ci_template
  versionLabel: v1.0
  type: Stage
  projectIdentifier: bankplatform
  orgIdentifier: default
  description: Shared CI template for all BankOps microservices
  spec:
    type: CI
    spec:
      cloneCodebase: true
      infrastructure:
        type: KubernetesDirect
        spec:
          connectorRef: ddstgk8s
          namespace: harness-builds
          automountServiceAccountToken: true
          os: Linux
      execution:
        steps:
          - step:
              name: Run Tests
              identifier: run_tests
              type: Run
              spec:
                connectorRef: dockerhub
                image: python:3.12-slim
                shell: Sh
                command: |
                  cd src/<+stage.variables.service_name>
                  pip install -r requirements.txt -q
                  pytest app/tests/ -v --tb=short
              failureStrategies:
                - onFailure:
                    errors: [AllErrors]
                    action:
                      type: Abort
          - step:
              name: Lint Check
              identifier: lint_check
              type: Run
              spec:
                connectorRef: dockerhub
                image: python:3.12-slim
                shell: Sh
                command: |
                  pip install flake8 -q
                  cd src/<+stage.variables.service_name>
                  flake8 app/ --max-line-length=100 --ignore=E501,W503 || true
          - step:
              name: Security Scan
              identifier: security_scan
              type: Run
              spec:
                connectorRef: dockerhub
                image: python:3.12-slim
                shell: Sh
                command: |
                  pip install bandit -q
                  cd src/<+stage.variables.service_name>
                  bandit -r app/ -ll --quiet || true
      variables:
        - name: service_name
          type: String
          value: <+input>
        - name: python_version
          type: String
          value: 3.12-slim
