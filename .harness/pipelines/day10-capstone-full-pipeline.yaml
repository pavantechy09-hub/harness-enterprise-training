# Day 10: Full Enterprise Capstone Pipeline
# Complete CI -> CD -> Governance -> Monitoring -> Cost
# All 4 services, all environments, production-grade
pipeline:
  name: day10-capstone-full-pipeline
  identifier: day10_capstone_full_pipeline
  projectIdentifier: bankplatform
  orgIdentifier: default
  description: Complete enterprise pipeline for BankOps platform
  tags:
    day: "10"
    type: capstone
  stages:

    # STAGE 1: CI - Run all tests
    - stage:
        name: CI All Services
        identifier: ci_all
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ddstgk8s
              namespace: harness-builds
              os: Linux
          execution:
            steps:
              - parallel:
                  - step:
                      name: Test accounts-service
                      identifier: test_accounts
                      type: Run
                      spec:
                        connectorRef: dockerhub
                        image: python:3.12-slim
                        command: |
                          cd src/accounts-service
                          pip install -r requirements.txt -q
                          pytest app/tests/ -v
                  - step:
                      name: Test payments-service
                      identifier: test_payments
                      type: Run
                      spec:
                        connectorRef: dockerhub
                        image: python:3.12-slim
                        command: |
                          cd src/payments-service
                          pip install -r requirements.txt -q
                          pytest app/tests/ -v
                  - step:
                      name: Test fraud-service
                      identifier: test_fraud
                      type: Run
                      spec:
                        connectorRef: dockerhub
                        image: python:3.12-slim
                        command: |
                          cd src/fraud-service
                          pip install -r requirements.txt -q
                          pytest app/tests/ -v
                  - step:
                      name: Test notification-service
                      identifier: test_notification
                      type: Run
                      spec:
                        connectorRef: dockerhub
                        image: python:3.12-slim
                        command: |
                          cd src/notification-service
                          pip install -r requirements.txt -q
                          pytest app/tests/ -v

    # STAGE 2: Deploy to Dev (automatic)
    - stage:
        name: Deploy Dev
        identifier: deploy_dev
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: accounts_service
          environment:
            environmentRef: dev
            infrastructureDefinitions:
              - identifier: dd_stg_k8s_infra
          execution:
            steps:
              - step:
                  name: Rolling Deploy Dev
                  type: K8sRollingDeploy
              - step:
                  name: Smoke Test Dev
                  type: Run
                  spec:
                    connectorRef: dockerhub
                    image: curlimages/curl:latest
                    command: |
                      curl -f http://accounts-service.accounts.svc.cluster.local/health
                      echo "Dev smoke test passed"

    # STAGE 3: SRE Approval for Staging
    - stage:
        name: Approval for Staging
        identifier: approve_staging
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: SRE Approves Staging
                  type: HarnessApproval
                  timeout: 24h
                  spec:
                    approvers:
                      userGroups: [_project_all_users]
                      minimumCount: 1

    # STAGE 4: Canary Deploy to Staging
    - stage:
        name: Canary Deploy Staging
        identifier: canary_staging
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: accounts_service
          environment:
            environmentRef: dev
            infrastructureDefinitions:
              - identifier: dd_stg_k8s_infra
          execution:
            steps:
              - step:
                  name: Canary 25 percent
                  type: K8sCanaryDeploy
                  spec:
                    instanceSelection:
                      type: Percentage
                      spec:
                        percentage: 25
              - step:
                  name: Verify Canary
                  type: Run
                  spec:
                    connectorRef: dockerhub
                    image: curlimages/curl:latest
                    command: |
                      sleep 30
                      curl -f http://accounts-service.accounts.svc.cluster.local/health
                      echo "Canary healthy"
            rollbackSteps:
              - step:
                  name: Canary Rollback
                  type: K8sCanaryDelete

    # STAGE 5: Two-person Prod Approval
    - stage:
        name: Production Approval
        identifier: prod_approval
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: SRE Approves Prod
                  type: HarnessApproval
                  timeout: 24h
                  spec:
                    approvers:
                      userGroups: [_project_all_users]
                      minimumCount: 1
              - step:
                  name: Platform Team Approves Prod
                  type: HarnessApproval
                  timeout: 24h
                  spec:
                    approvers:
                      userGroups: [_project_all_users]
                      minimumCount: 1

    # STAGE 6: Blue-Green Production Deploy
    - stage:
        name: Blue-Green Production
        identifier: bluegreen_prod
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: accounts_service
          environment:
            environmentRef: dev
            infrastructureDefinitions:
              - identifier: dd_stg_k8s_infra
          execution:
            steps:
              - step:
                  name: Blue-Green Deploy
                  type: K8sBlueGreenDeploy
              - step:
                  name: Post-Deploy Verification
                  type: Run
                  spec:
                    connectorRef: dockerhub
                    image: curlimages/curl:latest
                    command: |
                      sleep 60
                      curl -f http://accounts-service.accounts.svc.cluster.local/health
                      echo "Production deployment verified"
                      echo "SLO: 99.9% maintained"
            rollbackSteps:
              - step:
                  name: Blue-Green Rollback
                  type: K8sBlueGreenRollback

  notificationRules:
    - name: Deployment Notifications
      pipelineEvents:
        - type: PipelineSuccess
        - type: PipelineFailed
      notificationMethod:
        type: Slack
        spec:
          webhookUrl: <+secrets.getValue("slack_webhook_url")>
          message: |
            *BankOps Deployment*: <+pipeline.status>
            Pipeline: day10-capstone
            Triggered by: <+pipeline.triggeredBy.name>
