# Day 3: Jenkins Migration - payments-service
# Equivalent of the Jenkinsfile but with enterprise features added
# Adds: payments-service, approval gate, Slack notifications
pipeline:
  name: day3-payments-jenkins-migration
  identifier: day3_payments_jenkins_migration
  projectIdentifier: bankplatform
  orgIdentifier: default
  tags:
    day: "3"
    service: payments-service
  properties:
    ci:
      codebase:
        connectorRef: bankopsgithub
        repoName: harness-enterprise-training
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        name: Security Scan
        identifier: security_scan
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ddstgk8s
              namespace: harness-builds
              os: Linux
          execution:
            steps:
              - step:
                  name: Checkov IaC Scan
                  identifier: checkov_scan
                  type: Run
                  spec:
                    connectorRef: dockerhub
                    image: bridgecrew/checkov:latest
                    shell: Sh
                    command: |
                      checkov -d infra/ --quiet --compact \
                        --framework terraform \
                        --skip-check CKV_AWS_20,CKV_AWS_57 || true
                      echo "Checkov scan complete"
        failureStrategies:
          - onFailure:
              errors: [AllErrors]
              action:
                type: Abort

    - stage:
        name: Run Tests payments-service
        identifier: run_tests_payments
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ddstgk8s
              namespace: harness-builds
              os: Linux
          execution:
            steps:
              - step:
                  name: Pytest payments-service
                  identifier: pytest_payments
                  type: Run
                  spec:
                    connectorRef: dockerhub
                    image: python:3.12-slim
                    shell: Sh
                    command: |
                      cd src/payments-service
                      pip install -r requirements.txt -q
                      pytest app/tests/ -v

    - stage:
        name: Approval Gate
        identifier: approval_gate
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: SRE Approval
                  identifier: sre_approval
                  type: HarnessApproval
                  timeout: 24h
                  spec:
                    approvers:
                      userGroups: [_project_all_users]
                      minimumCount: 1
                    includePipelineExecutionHistory: true
                    approverInputs:
                      - name: deployment_reason
                        defaultValue: routine deployment

    - stage:
        name: Deploy to Dev
        identifier: deploy_dev
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ddstgk8s
              namespace: harness-builds
              os: Linux
          execution:
            steps:
              - step:
                  name: Deploy payments-service
                  identifier: deploy_payments
                  type: Run
                  spec:
                    connectorRef: dockerhub
                    image: bitnami/kubectl:latest
                    shell: Sh
                    command: |
                      echo "Deploying payments-service to dev..."
                      kubectl apply -f k8s/payments-service/ -n payments
                      kubectl rollout status deployment/payments-service -n payments
                      echo "Deployment complete"
