pipeline:
  name: day1-accounts-service-ci
  identifier: day1_accounts_service_ci
  projectIdentifier: bankplatform
  orgIdentifier: default
  properties:
    ci:
      codebase:
        connectorRef: bankopsgithub
        repoName: harness-enterprise-training
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        name: CI accounts-service
        identifier: CI_accountsservice
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ddstgk8s
              namespace: harness-builds
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Run Tests
                  identifier: Run_Tests
                  spec:
                    connectorRef: dockerhub
                    image: python:3.12-slim
                    shell: Sh
                    command: |
                      cd src/accounts-service
                      pip install -r requirements.txt -q
                      pytest app/tests/ -v