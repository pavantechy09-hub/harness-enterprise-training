pipeline:
  name: day4-all-services-ci
  identifier: day4_all_services_ci
  projectIdentifier: bankplatform
  orgIdentifier: default
  properties:
    ci:
      codebase:
        connectorRef: bankopsgithub
        repoName: harness-enterprise-training
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        name: OPA Policy Check
        identifier: opa_policy_check
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ddstgk8s
              namespace: harness-builds
              automountServiceAccountToken: true
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Evaluate OPA Policy
                  identifier: evaluate_opa
                  spec:
                    connectorRef: dockerhub
                    image: openpolicyagent/opa:latest
                    shell: Sh
                    command: |
                      echo "=== OPA Policy Evaluation ==="
                      cat > /tmp/policy.rego << 'REGO'
                      package pipeline
                      deny[msg] {
                        input.environment == "prod"
                        input.approvals < 2
                        msg := "Production requires 2 approvals"
                      }
                      deny[msg] {
                        input.triggered_by == input.approved_by
                        msg := "Cannot approve your own deployment"
                      }
                      REGO
                      cat > /tmp/input.json << 'JSON'
                      {
                        "environment": "dev",
                        "approvals": 1,
                        "triggered_by": "pavan",
                        "approved_by": "sre-team"
                      }
                      JSON
                      echo "Input:"
                      cat /tmp/input.json
                      echo "Evaluating..."
                      opa eval --data /tmp/policy.rego --input /tmp/input.json "data.pipeline.deny"
                      echo "All policies passed - deployment allowed"

    - stage:
        name: Test accounts-service
        identifier: test_accounts
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ddstgk8s
              namespace: harness-builds
              automountServiceAccountToken: true
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Run Tests
                  identifier: Run_Tests
                  spec:
                    connectorRef: dockerhub
                    image: python:3.12-slim
                    shell: Sh
                    command: |
                      cd src/accounts-service
                      pip install -r requirements.txt -q
                      pytest app/tests/ -v
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: Build_Push
                  spec:
                    connectorRef: dockerhubpush
                    repo: vguardai/accounts-service
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: src/accounts-service/Dockerfile
                    context: src/accounts-service

    - stage:
        name: Test payments-service
        identifier: test_payments
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ddstgk8s
              namespace: harness-builds
              automountServiceAccountToken: true
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Run Tests
                  identifier: Run_Tests
                  spec:
                    connectorRef: dockerhub
                    image: python:3.12-slim
                    shell: Sh
                    command: |
                      cd src/payments-service
                      pip install -r requirements.txt -q
                      pytest app/tests/ -v
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: Build_Push
                  spec:
                    connectorRef: dockerhubpush
                    repo: vguardai/payments-service
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: src/payments-service/Dockerfile
                    context: src/payments-service

    - stage:
        name: Test fraud-service
        identifier: test_fraud
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ddstgk8s
              namespace: harness-builds
              automountServiceAccountToken: true
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Run Tests
                  identifier: Run_Tests
                  spec:
                    connectorRef: dockerhub
                    image: python:3.12-slim
                    shell: Sh
                    command: |
                      cd src/fraud-service
                      pip install -r requirements.txt -q
                      pytest app/tests/ -v
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: Build_Push
                  spec:
                    connectorRef: dockerhubpush
                    repo: vguardai/fraud-service
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: src/fraud-service/Dockerfile
                    context: src/fraud-service

    - stage:
        name: Test notification-service
        identifier: test_notification
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ddstgk8s
              namespace: harness-builds
              automountServiceAccountToken: true
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Run Tests
                  identifier: Run_Tests
                  spec:
                    connectorRef: dockerhub
                    image: python:3.12-slim
                    shell: Sh
                    command: |
                      cd src/notification-service
                      pip install -r requirements.txt -q
                      pytest app/tests/ -v
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: Build_Push
                  spec:
                    connectorRef: dockerhubpush
                    repo: vguardai/notification-service
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: src/notification-service/Dockerfile
                    context: src/notification-service

    - stage:
        name: Approval Gate
        identifier: approval_gate
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: SRE Approval
                  identifier: sre_approval
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |
                      All 4 services passed tests and images pushed.
                      accounts-service:  vguardai/accounts-service:<+pipeline.sequenceId>
                      payments-service:  vguardai/payments-service:<+pipeline.sequenceId>
                      fraud-service:     vguardai/fraud-service:<+pipeline.sequenceId>
                      notification-service: vguardai/notification-service:<+pipeline.sequenceId>
                      Approve to confirm all builds ready.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []
