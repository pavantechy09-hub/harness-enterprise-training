apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts-service
  namespace: accounts
  labels:
    app: accounts-service
    version: "latest"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: accounts-service
      harness.io/track: stable
  template:
    metadata:
      labels:
        app: accounts-service
        harness.io/track: stable
    spec:
      containers:
        - name: accounts-service
          image: vguardai/accounts-service:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 3
          env:
            - name: SERVICE_NAME
              value: accounts-service
            - name: ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
